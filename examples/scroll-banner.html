<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <title>ScrollTail — Scroll Scrub Banner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #f0f0f0; }

    .spacer {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999;
      font-size: 1.2rem;
      text-align: center;
      padding: 0 40px;
    }

    .banner {
      width: 300px;
      height: 600px;
      margin: 0 auto;
      background: #0a0a0a;
      position: relative;
      overflow: hidden;
    }

    /* Baggrundsbillede — parallax slow */
    .bg {
      position: absolute;
      inset: -40px;
      background: linear-gradient(160deg, #0a0a0a 0%, #1a0a2e 40%, #2e0a1a 100%);
    }

    /* Overlay gradient */
    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.8) 100%);
    }

    .headline {
      position: absolute;
      top: 100px;
      left: 0; right: 0;
      text-align: center;
      color: #fff;
      font-size: 30px;
      font-weight: 700;
      line-height: 1.2;
      padding: 0 20px;
    }

    .subline {
      position: absolute;
      top: 210px;
      left: 0; right: 0;
      text-align: center;
      color: rgba(255,255,255,0.7);
      font-size: 15px;
      padding: 0 30px;
    }

    .slide-box {
      position: absolute;
      top: 320px;
      left: 20px; right: 20px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 16px;
      color: #fff;
      font-size: 13px;
      line-height: 1.6;
    }

    .cta {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff;
      color: #0a0a0a;
      padding: 14px 40px;
      border-radius: 4px;
      font-size: 15px;
      font-weight: 700;
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <div class="spacer">
    ↓ Scroll ned langsomt<br>
    <small style="color:#bbb; margin-top: 8px; display:block">
      st-scroll: animation er bundet til scroll-position.<br>
      Scrub frem og tilbage.
    </small>
  </div>

  <div class="banner">

    <!-- Baggrund: parallax slow — bevæger sig langsommere end scroll -->
    <div class="bg st-scroll st-parallax-slow"></div>
    <div class="overlay"></div>

    <!-- Headline: scrub fade op fra venstre -->
    <div class="headline st-scroll st-fade-left st-dist-xl">
      Scroll<br>Animation
    </div>

    <!-- Subline: scrub fade op -->
    <div class="subline st-scroll st-fade-up st-dist-md">
      Bundet direkte til scroll-positionen
    </div>

    <!-- Boks: scrub slide ind fra højre -->
    <div class="slide-box st-scroll st-slide-left st-dist-xl">
      Dette element glider ind fra højre mens du scroller.
      Scroll op igen — det glider tilbage ud.
    </div>

    <!-- CTA: scrub scale -->
    <div class="cta st-scroll st-scale">
      Oplev det
    </div>

  </div>

  <div class="spacer">↑ Scroll op — animationerne kører baglæns</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="../dist/scrolltail.min.js"></script>
</body>
</html>
