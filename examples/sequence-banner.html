<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <title>ScrollTail — Sequence Banner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #f0f0f0; }

    .spacer {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999;
      font-size: 1.2rem;
    }

    .banner {
      width: 300px;
      height: 600px;
      margin: 0 auto;
      background: #0d0d0d;
      position: relative;
      overflow: hidden;
    }

    .headline {
      position: absolute;
      top: 80px;
      left: 0; right: 0;
      text-align: center;
      color: #fff;
      font-size: 26px;
      font-weight: 700;
      padding: 0 20px;
    }

    .subline {
      position: absolute;
      top: 160px;
      left: 0; right: 0;
      text-align: center;
      color: rgba(255,255,255,0.6);
      font-size: 14px;
      padding: 0 30px;
    }

    .point {
      position: absolute;
      left: 30px; right: 30px;
      color: #fff;
      font-size: 14px;
      padding: 8px 0 8px 20px;
      border-left: 2px solid #e94560;
    }

    .point-1 { top: 240px; }
    .point-2 { top: 300px; }
    .point-3 { top: 360px; }

    .cta {
      position: absolute;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      background: #e94560;
      color: #fff;
      padding: 14px 40px;
      border-radius: 4px;
      font-size: 15px;
      font-weight: 700;
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <div class="spacer">↓ Scroll ned — elementerne kører i sekvens</div>

  <div class="banner">

    <!-- Sekventiel animation via st-order-* -->
    <!-- Alle seks kører automatisk som én GSAP timeline -->

    <div class="headline st-fade-up st-dist-lg st-dur-1000 st-ease-spring st-order-1">
      Ny Kollektion
    </div>

    <div class="subline st-fade-up st-dist-md st-dur-600 st-ease-out st-order-2">
      Forår / Sommer 2026
    </div>

    <div class="point point-1 st-fade-right st-dist-sm st-dur-400 st-ease-bounce st-order-3">
      Bæredygtige materialer
    </div>

    <div class="point point-2 st-fade-right st-dist-sm st-dur-400 st-ease-bounce st-order-4">
      Fri fragt over 499 kr
    </div>

    <div class="point point-3 st-fade-right st-dist-sm st-dur-400 st-ease-bounce st-order-5">
      30 dages returret
    </div>

    <!-- st-delay-200 tilføjer 200ms ekstra pause inden CTA starter -->
    <div class="cta st-scale st-dur-600 st-ease-spring st-order-6 st-delay-200">
      Shop nu
    </div>

  </div>

  <div class="spacer">Tidslinje: order-1 → 2 → 3 → 4 → 5 → (pause 200ms) → 6</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="../dist/scrolltail.min.js"></script>
</body>
</html>
