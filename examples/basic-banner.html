<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <title>ScrollTail — Basic Banner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #f0f0f0; }

    .spacer {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999;
      font-size: 1.2rem;
    }

    .banner {
      width: 300px;
      height: 600px;
      margin: 0 auto;
      background: #1a1a2e;
      position: relative;
      overflow: hidden;
    }

    .bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    }

    .headline {
      position: absolute;
      top: 120px;
      left: 0; right: 0;
      text-align: center;
      color: #fff;
      font-size: 28px;
      font-weight: 700;
      line-height: 1.2;
      padding: 0 20px;
    }

    .subline {
      position: absolute;
      top: 220px;
      left: 0; right: 0;
      text-align: center;
      color: rgba(255,255,255,0.7);
      font-size: 16px;
      padding: 0 30px;
    }

    .badge {
      position: absolute;
      top: 320px;
      left: 50%;
      transform: translateX(-50%);
      background: #e94560;
      color: #fff;
      padding: 8px 24px;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
    }

    .cta {
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff;
      color: #1a1a2e;
      padding: 14px 40px;
      border-radius: 4px;
      font-size: 15px;
      font-weight: 700;
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <div class="spacer">↓ Scroll ned for at se banneret</div>

  <div class="banner">
    <div class="bg"></div>

    <!-- Fade up — default trigger, kun én gang -->
    <div class="headline st-fade-up st-dist-lg st-dur-1000 st-ease-spring">
      Brand<br>Headline
    </div>

    <!-- Fade up med delay -->
    <div class="subline st-fade-up st-dist-md st-dur-600 st-ease-out st-delay-300">
      Supporting message her
    </div>

    <!-- Blur ind -->
    <div class="badge st-blur st-dur-600 st-ease-out st-delay-500">
      NYT PRODUKT
    </div>

    <!-- Scale ind med delay -->
    <div class="cta st-scale st-dur-600 st-ease-spring st-delay-750 st-visible-25">
      Læs mere
    </div>
  </div>

  <div class="spacer">↑ Scroll op igen</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="../dist/scrolltail.min.js"></script>
</body>
</html>
